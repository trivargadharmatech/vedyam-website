<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedyam — Ancient Wisdom. Modern Life.</title>
<meta name="description" content="Vedyam turns timeless Indian wisdom into structured, practical learning for modern life.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" type="image/jpeg" href="assets/decor/new_vedyam_logo.jpg">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <!-- Scroll Progress Indicator -->
  <div id="scrollProgress" aria-hidden="true"></div>

  <!-- Splash Screen -->
  <div id="splash-screen" role="status" aria-label="Loading Vedyam">
    <div class="splash-content">
      <span class="mark splash-mark" style="width:110px; height:110px; border-radius:50%; overflow:hidden; display:flex; justify-content:center; align-items:center; background: #fff; box-shadow: 0 0 40px rgba(255, 180, 50, 0.35);">
        <img src="assets/decor/new_vedyam_logo.jpg" alt="Vedyam" style="width:100%; height:100%; object-fit:cover; transform: scale(1.05);" decoding="async" fetchpriority="high" />
      </span>
      <h1 class="splash-text serif" style="font-size: 6.5rem; margin-left: 16px;">
        <span style="animation-delay: 0.1s">V</span><span style="animation-delay: 0.2s">e</span><span style="animation-delay: 0.3s">d</span><span style="animation-delay: 0.4s">y</span><span style="animation-delay: 0.5s">a</span><span style="animation-delay: 0.6s">m</span>
      </h1>
    </div>
  </div>

  <header class="nav" id="mainNav">
    <div class="nav-inner">
      <a href="#/" class="logo" aria-label="Vedyam Home">
        <span class="mark" aria-hidden="true" style="border-radius:50%; overflow:hidden; display:inline-flex; box-shadow: 0 0 15px rgba(255, 180, 50, 0.35);">
          <img src="assets/decor/new_vedyam_logo.jpg" alt="" style="width:100%; height:100%; object-fit:cover; transform: scale(1.05);" decoding="async" fetchpriority="high" />
        </span>
        <b>Vedyam</b>
      </a>
      <nav class="nav-links" id="navLinks" aria-label="Main navigation"></nav>
      <div class="nav-right" id="navRight"></div>
      <!-- Hamburger menu button for mobile -->
      <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Mobile Drawer -->
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <div class="mobile-drawer" id="mobileDrawer" role="navigation" aria-label="Mobile navigation"></div>

  <div id="global-decorations" aria-hidden="true">
    <svg viewBox="-200 -200 400 400" class="global-decor-chakra" fill="none" stroke="currentColor" stroke-width="1.5">
      <g>
        <!-- Hub / Axle -->
        <circle r="10" stroke-width="3" />
        <circle r="25" stroke-dasharray="2 4" stroke-width="2" />
        <circle r="30" stroke-width="1" />
        <circle r="40" stroke-dasharray="8 8" stroke-width="1" />
        
        <!-- Inner spokes -->
        <path d="M0 -30 L0 -60 M30 0 L60 0 M0 30 L0 60 M-30 0 L-60 0" stroke-width="2" />
        <path d="M-21.2 -21.2 L-42.4 -42.4 M21.2 -21.2 L42.4 -42.4 M21.2 21.2 L42.4 42.4 M-21.2 21.2 L-42.4 42.4" stroke-width="2" />

        <circle r="60" stroke-width="2" />
        <circle r="66" stroke-dasharray="1 3" stroke-width="4" />
        <circle r="72" stroke-width="1" />
        <circle r="115" stroke-dasharray="2 4.68" stroke-width="6" />
        <circle r="111" stroke-width="1" />
        <circle r="119" stroke-width="1" />

        <!-- Inner lotus petals -->
        <g id="petal-inner">
          <path d="M0 -60 Q15 -80 0 -110 Q-15 -80 0 -60 Z" stroke-width="1.5" />
          <path d="M0 -60 Q10 -80 0 -105 Q-10 -80 0 -60 Z" stroke-width="0.5" />
        </g>
        <use href="#petal-inner" transform="rotate(22.5)" />
        <use href="#petal-inner" transform="rotate(45)" />
        <use href="#petal-inner" transform="rotate(67.5)" />
        <use href="#petal-inner" transform="rotate(90)" />
        <use href="#petal-inner" transform="rotate(112.5)" />
        <use href="#petal-inner" transform="rotate(135)" />
        <use href="#petal-inner" transform="rotate(157.5)" />
        <use href="#petal-inner" transform="rotate(180)" />
        <use href="#petal-inner" transform="rotate(202.5)" />
        <use href="#petal-inner" transform="rotate(225)" />
        <use href="#petal-inner" transform="rotate(247.5)" />
        <use href="#petal-inner" transform="rotate(270)" />
        <use href="#petal-inner" transform="rotate(292.5)" />
        <use href="#petal-inner" transform="rotate(315)" />
        <use href="#petal-inner" transform="rotate(337.5)" />
        
        <!-- Sharp outer blades -->
        <g id="blade">
          <path d="M0 -120 L25 -140 L0 -195 L-25 -140 Z" stroke-width="2" stroke-linejoin="miter" />
          <path d="M0 -120 L15 -140 L0 -185 L-15 -140 Z" stroke-width="1" />
          <line x1="0" y1="-120" x2="0" y2="-195" stroke-width="1" />
        </g>
        <use href="#blade" transform="rotate(0)" />
        <use href="#blade" transform="rotate(45)" />
        <use href="#blade" transform="rotate(90)" />
        <use href="#blade" transform="rotate(135)" />
        <use href="#blade" transform="rotate(180)" />
        <use href="#blade" transform="rotate(225)" />
        <use href="#blade" transform="rotate(270)" />
        <use href="#blade" transform="rotate(315)" />

        <!-- Diamonds between blades -->
        <g id="diamond">
          <path d="M0 -120 L8 -130 L0 -140 L-8 -130 Z" stroke-width="1" />
        </g>
        <use href="#diamond" transform="rotate(22.5)" />
        <use href="#diamond" transform="rotate(67.5)" />
        <use href="#diamond" transform="rotate(112.5)" />
        <use href="#diamond" transform="rotate(157.5)" />
        <use href="#diamond" transform="rotate(202.5)" />
        <use href="#diamond" transform="rotate(247.5)" />
        <use href="#diamond" transform="rotate(292.5)" />
        <use href="#diamond" transform="rotate(337.5)" />
      </g>
    </svg>
  </div>

  <main id="app"></main>

  <footer class="footer">
    <div class="container fi">
      <a href="#/" class="logo" style="font-size:1.2rem" aria-label="Vedyam Home">
        <span class="mark" style="width:24px;height:24px; border-radius:50%; overflow:hidden; display:inline-flex;" aria-hidden="true">
          <img src="assets/decor/vedyam_logo.jpeg" alt="" style="width:100%; height:100%; object-fit:cover;" loading="lazy" decoding="async" />
        </span>Vedyam
      </a>
      <div>Ancient Wisdom. Modern Life.</div>
    </div>
  </footer>

  <!-- Back-to-top button -->
  <button id="backToTop" aria-label="Back to top">↑</button>

  <div class="toasts" id="toasts" role="alert" aria-live="polite"></div>

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- config first (where the backend lives), then the app -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
